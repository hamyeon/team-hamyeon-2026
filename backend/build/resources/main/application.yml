spring:
  profiles:
    include: secret

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    s3:
      bucket: vintic-mvp-bucket-123
    region:
      static: ap-northeast-2

openai:
  api:
    key: ${OPENAI_API_KEY}

logging:
  level:
    root: INFO
    com.vintic.backend: INFO