version: '3.8'
services:
  backend:
    build: .
    ports:
      - "8080:8080"
    restart: always
    environment:
      # AWS S3 설정
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=ap-northeast-2
      - S3_BUCKET_NAME=vintic-mvp-bucket-123

      # OpenAI 설정
      - OPENAI_API_KEY=${OPENAI_API_KEY}